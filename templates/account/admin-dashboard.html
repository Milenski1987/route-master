{% extends 'home-page.html' %}

{% block content %}
<div class="container mt-4">
    <div class="mb-3 d-flex gap-2 w-50 mx-auto">
        <input type="text" id="search-input" class="form-control" placeholder="Search users by name...">
        <button class="btn btn-success" onclick="filterUsers()">Search</button>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" id="users-table">
                <thead class="table-dark">
                    <tr>
                        <th>Employee ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Group</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr>
                        <td colspan="5" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm"></div> Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let allUsers = [];

async function loadUsers() {
    const response = await fetch('/accounts/api/users/');
    allUsers = await response.json();
    renderUsers(allUsers);
}

function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');

    if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center">No users found.</td></tr>`;
        return;
    }

    tbody.innerHTML = users.map(user => `
        <tr>
            <td><span class="badge bg-secondary">${user.employee_id}</span></td>
            <td>${user.first_name}</td>
            <td>${user.last_name}</td>
            <td><a href="mailto:${user.email}">${user.email}</a></td>
            <td>${user.user_groups.length ? user.user_groups.join(', ') : '<span class="text-muted">No group</span>'}</td>
        </tr>
    `).join('');
}

function filterUsers() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();

    const filtered = allUsers.filter(user => {
        const fullName = `${user.first_name} ${user.last_name}`.toLowerCase();
        return fullName.includes(query);
    });

    renderUsers(filtered);
}

function clearSearch() {
    document.getElementById('search-input').value = '';
    renderUsers(allUsers);
}

loadUsers();
</script>
{% endblock %}
