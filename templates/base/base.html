{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ request.user.settings.theme|lower|default:'light' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="{% static 'images/title_logo.png' %}">
    <title>RouteMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        [data-bs-theme="dark"] {
        --bs-body-bg: #1a1a1a;
        --bs-secondary-bg: #2a2a2a;
        --bs-card-bg: #1a1a1a;
        --bs-body-color: #e8e8e8;
        --bs-secondary-color: #aaa;
        --bs-border-color: #3a3a3a;
        --bs-tertiary-bg: #1a1a1a;
        }


        body {
            background-image: url("{% static 'images/home_page_background.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="vh-100 d-flex flex-column overflow-hidden">
    {% block navbar %}
        <header class="flex-shrink-0">
            {% include 'common/navbar.html' %}
        </header>
    {% endblock %}
    <div class="flex-fill overflow-auto d-flex flex-column">
        <main class="flex-fill d-flex flex-column">
            {% block content %}

            {% endblock %}
        </main>
        {% include 'common/footer.html' %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
